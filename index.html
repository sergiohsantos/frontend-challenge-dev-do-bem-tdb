<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/apple-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="theme-color" content="#E63946" />
    <meta name="description" content="Turma do Bem - Transformando sorrisos, mudando vidas. Conectamos voluntarios da saude a pessoas que precisam de atendimento odontologico gratuito." />
    <meta name="keywords" content="odontologia, voluntariado, saude bucal, dentista, tratamento gratuito, ONG, Turma do Bem" />
    <meta name="author" content="Turma do Bem" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Turma do Bem - Transformando Sorrisos" />
    <meta property="og:description" content="Conectamos voluntarios da saude a pessoas que precisam de atendimento odontologico gratuito." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>Turma do Bem - Transformando Sorrisos</title>
  </head>
  <body>
    <div id="root"></div>
    <div vw class="enabled notranslate">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      ;(function () {
        var appUrl = "https://vlibras.gov.br/app"
        var scriptId = "vlibras-plugin-script"
        var cacheResetKey = "tdb-vlibras-unity-cache-reset-20260510"
        var widgetSelector = "[vw]"

        function warn(message, error) {
          if (window.console && typeof window.console.warn === "function") {
            window.console.warn("[VLibras]", message, error || "")
          }
        }

        function isAdminRoute() {
          return window.location.pathname === "/admin" || window.location.pathname.indexOf("/admin/") === 0
        }

        function setVlibrasVisibility() {
          var widget = document.querySelector(widgetSelector)
          if (widget) {
            widget.style.display = isAdminRoute() ? "none" : ""
          }
        }

        function hasResetCache() {
          try {
            return window.localStorage.getItem(cacheResetKey) === "ok"
          } catch (error) {
            return false
          }
        }

        function markCacheAsReset() {
          try {
            window.localStorage.setItem(cacheResetKey, "ok")
          } catch (error) {
            warn("Nao foi possivel marcar a limpeza do cache local.", error)
          }
        }

        function deleteIndexedDb(databaseName) {
          return new Promise(function (resolve) {
            if (!window.indexedDB) {
              resolve()
              return
            }

            var resolved = false
            var finish = function () {
              if (!resolved) {
                resolved = true
                resolve()
              }
            }

            var timeout = window.setTimeout(finish, 1500)

            try {
              var request = window.indexedDB.deleteDatabase(databaseName)
              request.onsuccess = function () {
                window.clearTimeout(timeout)
                finish()
              }
              request.onerror = function () {
                window.clearTimeout(timeout)
                finish()
              }
              request.onblocked = finish
            } catch (error) {
              window.clearTimeout(timeout)
              warn("Nao foi possivel limpar o UnityCache.", error)
              finish()
            }
          })
        }

        function resetVlibrasUnityCacheOnce() {
          if (!window.indexedDB || hasResetCache()) {
            return Promise.resolve()
          }

          if (!window.__vlibrasCacheResetPromise) {
            window.__vlibrasCacheResetPromise = deleteIndexedDb("UnityCache").finally(markCacheAsReset)
          }

          return window.__vlibrasCacheResetPromise
        }

        function initializeVlibras() {
          try {
            if (isAdminRoute()) {
              setVlibrasVisibility()
              return
            }
            if (window.__vlibrasLoaded) return
            if (!window.VLibras || !window.VLibras.Widget) {
              warn("Script carregado, mas window.VLibras.Widget nao esta disponivel.")
              return
            }

            window.__vlibrasLoaded = true
            new window.VLibras.Widget(appUrl)
          } catch (error) {
            window.__vlibrasLoaded = false
            warn("Falha ao inicializar o widget.", error)
          }
        }

        function loadVlibrasScript() {
          try {
            setVlibrasVisibility()
            if (isAdminRoute()) return
            if (window.__vlibrasLoaded) return

            var existingScript = document.getElementById(scriptId)
            if (existingScript) {
              if (window.VLibras && window.VLibras.Widget) {
                initializeVlibras()
              } else {
                existingScript.addEventListener("load", initializeVlibras, { once: true })
              }
              return
            }

            var script = document.createElement("script")
            script.id = scriptId
            script.src = appUrl + "/vlibras-plugin.js"
            script.async = true
            script.onload = initializeVlibras
            script.onerror = function (error) {
              warn("Nao foi possivel carregar vlibras-plugin.js.", error)
            }
            document.body.appendChild(script)
          } catch (error) {
            warn("Falha ao carregar o script do widget.", error)
          }
        }

        function handleRouteChange() {
          setVlibrasVisibility()
          if (!isAdminRoute()) {
            resetVlibrasUnityCacheOnce().then(loadVlibrasScript).catch(loadVlibrasScript)
          }
        }

        function watchRouteChanges() {
          var originalPushState = window.history.pushState
          var originalReplaceState = window.history.replaceState

          window.history.pushState = function () {
            var result = originalPushState.apply(this, arguments)
            window.setTimeout(handleRouteChange, 0)
            return result
          }

          window.history.replaceState = function () {
            var result = originalReplaceState.apply(this, arguments)
            window.setTimeout(handleRouteChange, 0)
            return result
          }

          window.addEventListener("popstate", handleRouteChange)
        }

        setVlibrasVisibility()
        watchRouteChanges()
        handleRouteChange()
      })()
    </script>
  </body>
</html>
